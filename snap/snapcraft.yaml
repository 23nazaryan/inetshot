name: inetshot
base: core24
version: '0.1.0'
summary: Lightshot-style screenshot and annotation tool for Linux
description: |
  InetShot is a fast, Lightshot-style screenshot and annotation tool
  for Ubuntu/GNOME.

  Press your hotkey, drag to select a region on screen, then annotate
  with arrows, freehand pen, rectangles, highlighter, lines, or text.
  Copy the result directly to your clipboard or save to a file.

  Supports GNOME 46+ on Wayland and X11.
  Source: https://github.com/23nazaryan/inetshot

license: MIT
grade: stable
confinement: strict

apps:
  inetshot:
    command: bin/launcher
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - home
      - opengl
      - gsettings

parts:
  deps:
    plugin: nil
    stage-packages:
      - python3-minimal
      - python3-pyqt6
      - python3-dbus
      - python3-gi
      - gir1.2-glib-2.0
      - libnotify-bin
      - wl-clipboard

  app:
    plugin: dump
    source: .
    prime:
      - inetshot.py

  launcher:
    plugin: dump
    source: snap/local/
    organize:
      launcher: bin/launcher

title: InetShot
contact: https://github.com/23nazaryan/inetshot/issues
issues: https://github.com/23nazaryan/inetshot/issues
source-code: https://github.com/23nazaryan/inetshot
website: https://github.com/23nazaryan/inetshot
